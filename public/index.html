<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Smart Waste Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<link rel="stylesheet" href="style.css"/>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
<div class="container-fluid">
<a class="navbar-brand fw-bold">Smart Waste Dashboard</a>

<button class="btn btn-outline-secondary btn-sm" id="refreshBtn">
<i class="fa fa-sync"></i> Refresh
</button>

</div>
</nav>

<main class="container my-4">

<div class="row g-4">

<!-- LEFT PANEL -->
<div class="col-lg-4">

<div class="card p-4 shadow-sm">

<h5>Bin ID</h5>
<h2 id="binId">BIN_001</h2>
<p id="lastSeen" class="text-muted">Last update: --</p>

<div class="row gy-3">

<!-- Fill -->
<div class="col-12">
<div class="metric-card p-3 rounded">

<div class="d-flex justify-content-between align-items-center">

<div>
<small class="text-muted">Fill Level</small>
<div id="fillValue" class="metric-value">-- %</div>
</div>

<div id="fillGauge"></div>

</div>

<div id="fillStatus" class="mt-2"></div>

</div>
</div>

<!-- Gas -->
<div class="col-12">
<div class="metric-card p-3 rounded">

<div class="d-flex justify-content-between align-items-center">

<div>
<small class="text-muted">Gas (ppm)</small>
<div id="gasValue" class="metric-value">-- ppm</div>
</div>

<div id="gasGauge"></div>

</div>

<div id="gasStatus" class="mt-2"></div>

</div>
</div>

</div>
</div>
</div>

<!-- RIGHT PANEL -->
<div class="col-lg-8">

<div class="card p-3 mb-4 shadow-sm">
<h6>Real-time Graph</h6>
<canvas id="lineChart" height="120"></canvas>
</div>

<!-- Alerts -->
<div class="card p-3 mb-3 shadow-sm">

<h6>Alerts</h6>
<ul id="alertsList" class="list-group list-group-flush"></ul>

</div>

<!-- SMS Status -->
<div id="smsStatusCard" class="card p-3 mb-4 shadow-sm" style="display:none;">

<div class="d-flex align-items-center">

<div id="smsStatusIcon"></div>

<div class="ms-3">
<div id="smsStatusTitle">SMS Status</div>
<div id="smsStatusText" class="text-muted"></div>
</div>

<div class="ms-auto">
<button id="smsRetryBtn" class="btn btn-danger btn-sm" style="display:none">
<i class="fa fa-paper-plane"></i> Retry SMS
</button>
</div>

</div>

</div>

<!-- History -->
<div class="card p-3 shadow-sm">

<h6>History (Last 10)</h6>

<div class="table-responsive">

<table class="table table-sm table-hover" id="historyTable">

<thead class="table-light">
<tr>
<th>Time</th>
<th>Fill %</th>
<th>Gas ppm</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>
</div>

</div>

</div>

</main>

<script src="script.js"></script>

</body>
</html>
